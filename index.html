<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>CALCULA IMC</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fundo">
        <img src="imagem.png" class="imagem">
        <div class="principal">
            <h1 class="titulo"><strong>CALCULE SEU ÍNDICE DE MASSA CORPORAL</strong></h1>
            <div class="calcula">
                <div class="IMC"> 
                    <span id="resultado">0.00 </span> 
                    <p id="mensagem"> IMC</p> 
                </div>
                <span id="resultado"> </span>
                <p>Massa(kg):</p>
                <input class="Massa"><br> 
                <p>Altura(m):</p>
                <input class="Altura"> <br>
                <button id="botao">CALCULAR</button>
            </div>
        </div>
        
    </div>
</body>
<script src="script.js"></script>
</html>
